<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width, initial-scale=1.0"><title>TouchFish Client·60s Promo</title><script src="https://unpkg.com/react@18/umd/react.production.min.js"crossorigin></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"crossorigin></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><style>@font-face{font-family:'HarmonyOS Sans SC';src:url('HarmonyOS_Sans_SC.ttf')format('truetype');font-weight:400}@font-face{font-family:'HarmonyOS Sans SC';src:url('HarmonyOS_Sans_SC.ttf')format('truetype');font-weight:700}@font-face{font-family:'LXGW WenKai';src:url('LXGWWenKai.ttf')format('truetype')}*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden}</style></head><body><div id="root"></div><script type="text/babel">const{createContext,useContext,useState,useEffect,useRef,useCallback}=React;const TimeContext=createContext({time:0,duration:60,playing:false});const SpriteContext=createContext(null);const Easing={linear:t=>t,easeIn:t=>t*t,easeOut:t=>1-(1-t)*(1-t),easeInOut:t=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2,expoOut:t=>t===1?1:1-Math.pow(2,-10*t),overshoot:t=>{const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2)},spring:t=>{const c=(2*Math.PI)/3;return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c)+1},anticipation:t=>{if(t<0.2)return-0.3*(t/0.2)*(t/0.2);const adjusted=(t-0.2)/0.8;return-0.012+1.012*adjusted*adjusted*(3-2*adjusted)},};function interpolate(t,input,output,easing){const[inStart,inEnd]=input;const[outStart,outEnd]=output;if(t<=inStart)return outStart;if(t>=inEnd)return outEnd;let progress=(t-inStart)/(inEnd-inStart);if(easing)progress=easing(progress);return outStart+(outEnd-outStart)*progress}function useTime(){return useContext(TimeContext).time}function useSprite(){const sprite=useContext(SpriteContext);if(!sprite)return{t:0,elapsed:0,duration:0};return sprite}const stageStyles={wrapper:{position:'fixed',inset:0,background:'#000',display:'flex',flexDirection:'column',fontFamily:'-apple-system, sans-serif'},stageHolder:{flex:1,position:'relative',overflow:'hidden'},canvas:{position:'absolute',top:'50%',left:'50%',transformOrigin:'center center',background:'#0A0A0F',overflow:'hidden'},controls:{position:'fixed',bottom:0,left:0,right:0,background:'rgba(0,0,0,0.75)',backdropFilter:'blur(10px)',padding:'10px 20px',display:'flex',alignItems:'center',gap:14,color:'#fff',fontSize:12,zIndex:100},button:{background:'none',border:'1px solid rgba(255,255,255,0.25)',color:'#fff',padding:'5px 12px',borderRadius:4,cursor:'pointer',fontSize:11},timeDisplay:{fontFamily:'ui-monospace, monospace',fontVariantNumeric:'tabular-nums',minWidth:85,fontSize:12},scrubber:{flex:1,height:4,background:'rgba(255,255,255,0.15)',borderRadius:2,position:'relative',cursor:'pointer'},scrubberFill:{position:'absolute',top:0,left:0,height:'100%',background:'#9F7AEA',borderRadius:2,pointerEvents:'none'},scrubberHandle:{position:'absolute',top:'50%',width:12,height:12,background:'#fff',borderRadius:'50%',transform:'translate(-50%, -50%)',pointerEvents:'none'},};function Stage({duration=60,width=1920,height=1080,fps=60,loop=false,children,bgColor='#0A0A0F'}){const[time,setTime]=useState(0);const[playing,setPlaying]=useState(true);const[scale,setScale]=useState(1);const rafRef=useRef(null);const canvasRef=useRef(null);const effectiveLoop=(typeof window!=='undefined'&&window.__recording)?false:loop;useEffect(()=>{function updateScale(){const vw=window.innerWidth;const vh=window.innerHeight-48;const s=Math.min(vw/width,vh/height);setScale(s)}updateScale();window.addEventListener('resize',updateScale);return()=>window.removeEventListener('resize',updateScale)},[width,height]);useEffect(()=>{if(!playing)return;let cancelled=false;let last=null;function tick(now){if(cancelled)return;if(last===null){last=now;if(typeof window!=='undefined')window.__ready=true}const delta=(now-last)/1000;last=now;setTime(prev=>{const next=prev+delta;if(next>=duration)return effectiveLoop?0:duration-0.001;return next});rafRef.current=requestAnimationFrame(tick)}const startAfterFonts=()=>{if(cancelled)return;rafRef.current=requestAnimationFrame(tick)};if(typeof document!=='undefined'&&document.fonts&&document.fonts.ready){document.fonts.ready.then(startAfterFonts)}else{startAfterFonts()}return()=>{cancelled=true;cancelAnimationFrame(rafRef.current)}},[playing,duration,effectiveLoop]);const handleSeek=useCallback((e)=>{const rect=e.currentTarget.getBoundingClientRect();const ratio=(e.clientX-rect.left)/rect.width;setTime(Math.max(0,Math.min(duration,ratio*duration)));setPlaying(false)},[duration]);const progress=time/duration;const ctx={time,duration,playing,setPlaying,setTime};const canvasStyle={...stageStyles.canvas,width,height,background:bgColor,transform:`translate(-50%,-50%)scale(${scale})`};return(<TimeContext.Provider value={ctx}><div style={stageStyles.wrapper}><div style={stageStyles.stageHolder}><div ref={canvasRef}style={canvasStyle}>{children}</div></div><div style={stageStyles.controls}><button style={stageStyles.button}onClick={()=>setPlaying(p=>!p)}>{playing?'⏸':'▶'}</button><button style={stageStyles.button}onClick={()=>setTime(0)}>⏮</button><div style={stageStyles.timeDisplay}>{time.toFixed(1)}s/{duration.toFixed(0)}s</div><div style={stageStyles.scrubber}onMouseDown={handleSeek}><div style={{...stageStyles.scrubberFill,width:`${progress*100}%`}}/><div style={{...stageStyles.scrubberHandle,left:`${progress*100}%`}}/></div><span style={{fontSize:10,opacity:0.4}}>TOUCHFISH</span></div></div></TimeContext.Provider>)}function Sprite({start=0,end,children,style}){const{time}=useContext(TimeContext);const actualEnd=end==null?Infinity:end;if(time<start||time>=actualEnd)return null;const duration=actualEnd-start;const elapsed=time-start;const t=duration===0?1:Math.max(0,Math.min(1,elapsed/duration));const spriteValue={t,elapsed,duration,start,end:actualEnd};return(<SpriteContext.Provider value={spriteValue}><div style={{position:'absolute',inset:0,...style}}>{children}</div></SpriteContext.Provider>)}const B={bg:'#0A0A0F',surface:'#14141F',primary:'#6750A4',accent:'#9F7AEA',accentBright:'#B794F4',text:'#F5F0FF',textDim:'rgba(245,240,255,0.45)',white:'#FFFFFF',};function FadeScale({children,delay=0,from=1.1,to=1,fromY=30,style:extra}){const{t}=useSprite();const p=interpolate(t,[delay,delay+0.35],[0,1],Easing.expoOut);const s=interpolate(p,[0,1],[from,to],Easing.expoOut);const y=interpolate(p,[0,1],[fromY,0],Easing.expoOut);const o=interpolate(p,[0,1],[0,1],Easing.expoOut);return<div style={{opacity:o,transform:`scale(${s})translateY(${y}px)`,...extra}}>{children}</div>}function FadeIn({children,delay=0,style:extra}){const{t}=useSprite();const o=interpolate(t,[delay,delay+0.3],[0,1],Easing.expoOut);return<div style={{opacity:o,...extra}}>{children}</div>}function SlideUp({children,delay=0,fromY=60,style:extra}){const{t}=useSprite();const o=interpolate(t,[delay,delay+0.3],[0,1],Easing.expoOut);const y=interpolate(o,[0,1],[fromY,0],Easing.expoOut);return<div style={{opacity:o,transform:`translateY(${y}px)`,...extra}}>{children}</div>}function StaggerText({items,baseDelay=0,stagger=0.08,style:extra}){const{t}=useSprite();return(<div style={extra}>{items.map((item,i)=>{const d=baseDelay+i*stagger;const o=interpolate(t,[d,d+0.25],[0,1],Easing.expoOut);const y=interpolate(o,[0,1],[20,0],Easing.expoOut);return<div key={i}style={{opacity:o,transform:`translateY(${y}px)`,...item.style}}>{item.text}</div>})}</div>)}function GlowRing({size=400,color=B.accent,opacity=0.15}){return(<div style={{position:'absolute',width:size,height:size,borderRadius:'50%',background:`radial-gradient(circle,${color}44 0%,${color}11 40%,transparent 70%)`,top:'50%',left:'50%',transform:'translate(-50%, -50%)',pointerEvents:'none',}}/>)}function Particle({index,total,parentT}){const angle=(index/total)*Math.PI*2;const dist=180+Math.random()*120;const x=Math.cos(angle)*dist;const y=Math.sin(angle)*dist;const size=2+Math.random()*3;const delay=index*0.02;const p=interpolate(parentT,[delay,delay+0.5],[0,1],Easing.expoOut);const r=interpolate(p,[0,1],[0,dist],Easing.expoOut);const o=interpolate(p,[0,0.1,0.8,1],[0,0.8,0.6,0],Easing.linear);return(<div style={{position:'absolute',width:size,height:size,borderRadius:'50%',background:B.accentBright,top:'50%',left:'50%',transform:`translate(calc(-50%+${Math.cos(angle)*r}px),calc(-50%+${Math.sin(angle)*r}px))`,opacity:o,boxShadow:`0 0 ${size*2}px ${B.accent}`,}}/>)}const platforms=[{name:'Windows',icon:'⊞',color:'#00A4EF'},{name:'macOS',icon:'⌘',color:'#A2AAAD'},{name:'Linux',icon:'🐧',color:'#FCC624'},{name:'Android',icon:'📱',color:'#3DDC84'},];function S1_Intro(){const{t}=useSprite();return(<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>{}<div style={{position:'absolute',inset:0,background:`radial-gradient(ellipse at 50%45%,${B.primary}22 0%,transparent 60%)`}}/>{}<div style={{position:'absolute',inset:0}}>{Array.from({length:24},(_,i)=><Particle key={i}index={i}total={24}parentT={t}/>)}</div>{}<FadeScale delay={0.05}from={0.6}to={1}fromY={0}><img src="logo.png"alt="TouchFish"style={{width:180,height:180,marginBottom:0,filter:`drop-shadow(0 0 40px ${B.accent}66)`}}/></FadeScale>{}<Sprite start={0}end={9}><GlowRing size={350}color={B.accent}opacity={0.2}/></Sprite>{}<FadeScale delay={0.35}from={1.05}to={1}fromY={20}style={{marginTop:16}}><h1 style={{fontFamily:'"HarmonyOS Sans SC", -apple-system, sans-serif',fontSize:72,fontWeight:700,color:B.white,letterSpacing:'0.04em',textAlign:'center',textShadow:`0 0 60px ${B.accent}44`,}}>TouchFish Client</h1></FadeScale>{}<FadeIn delay={0.65}style={{marginTop:12}}><p style={{fontFamily:'"LXGW WenKai", "HarmonyOS Sans SC", serif',fontSize:26,color:B.textDim,letterSpacing:'0.12em',textAlign:'center',}}>不只是聊天，是社区</p></FadeIn>{}<FadeIn delay={0.85}st
